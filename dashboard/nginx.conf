server {
    # nginxinc/nginx-unprivileged 이미지는 non-root 라 < 1024 바인딩 불가 → 기본 8080.
    # docker-compose 에서 호스트 3000 으로 매핑.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # =========================================================================
    # 보안 헤더 (server-level) — 모든 응답에 기본 적용.
    # =========================================================================
    # nginx add_header 상속 규칙(주의!):
    #   하위 location 블록이 자체 add_header 를 가지면 상위 server-level add_header 가
    #   '전부' 무시된다 (개별 헤더 단위 merge 가 아니라 블록 단위 override).
    #   → /assets/ location 에서 Cache-Control 을 추가하려고 add_header 를 쓰는 순간
    #      여기 정의된 보안 헤더 5종이 그 location 에서만 사라지는 사고가 발생.
    #   → 해결책: /assets/ 안에서 보안 헤더를 모두 재명시 (DRY 위반 < 보안 누락).
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-Frame-Options        "DENY"                            always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    # CSP: same-origin 화이트리스트 + recharts/인라인 style 호환을 위해 style 만 'unsafe-inline' 허용.
    # 향후 인라인 style 을 CSS 모듈/토큰으로 추출하면 'unsafe-inline' 제거 예정.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    # HSTS 는 HTTPS 위에서만 의미 있음. 현재 컨테이너는 평문 HTTP 서빙이라 비활성.
    # 운영 환경에서 TLS terminator(ALB/Cloudflare) 뒤에 둘 때 활성화:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =========================================================================
    # SPA fallback — 모든 알려지지 않은 경로를 index.html 로 라우팅 (React Router 대응).
    # =========================================================================
    location / {
        # try_files: $uri (정적 파일) → $uri/ (디렉터리) → /index.html (SPA 라우트).
        # 마지막 fallback 이 internal redirect 라 브라우저 URL 은 보존됨 (deep link 지원).
        try_files $uri $uri/ /index.html;
    }

    # =========================================================================
    # /api/ → api 컨테이너 (Kotlin/Ktor) 리버스 프록시.
    #   대시보드 코드는 BASE 를 '/api' 로 고정 → same-origin 호출 → CORS 우회.
    # =========================================================================
    location /api/ {
        # trailing slash 매칭: '/api/logs' → 'http://api:8081/api/logs' (path 보존).
        # 'api' 는 compose 네트워크의 service name → 내부 DNS 가 IP 로 해석.
        proxy_pass http://api:8081/api/;
        # HTTP/1.1 강제: keep-alive 와 chunked transfer 를 쓰기 위함 (기본 1.0 은 connection per request).
        proxy_http_version 1.1;
        # 원본 Host 전달 → api 가 Host 헤더 기반 라우팅/로깅을 할 수 있음.
        proxy_set_header Host              $host;
        # X-Real-IP / X-Forwarded-For: api 가 클라이언트 실제 IP 를 알기 위함.
        # honeypot 분석 관점에서 nginx IP 가 아니라 attacker IP 가 로그에 필요.
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # 스킴 전달 → api 가 secure cookie / redirect 생성 시 http/https 판단 가능.
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # /assets/ — Vite 빌드 산출물 (hash-suffixed immutable 파일).
    #   파일명 자체에 콘텐츠 해시가 박혀 있어 캐시 무효화는 새 빌드 = 새 파일명으로 자동 해결.
    # =========================================================================
    location /assets/ {
        # 1년 캐시 + immutable: 브라우저가 재검증 없이 영구 캐시 사용 (조건부 GET 도 생략).
        expires 1y;
        add_header Cache-Control          "public, immutable"               always;

        # ▼ 보안 헤더 재명시 — server-level add_header 가 이 블록에서 override 로 사라지기 때문.
        # ▼ 누락 시 /assets/ 응답에서만 CSP/XFO 등이 빠지는 부분적 보안 구멍이 생긴다.
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header X-Frame-Options        "DENY"                            always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    }
}
