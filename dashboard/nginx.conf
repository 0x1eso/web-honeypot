server {
    # nginxinc/nginx-unprivileged 이미지는 기본 8080. Phase 4 non-root 전환.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ===== 보안 헤더 (server-level) =====
    # 주의: nginx는 location 블록에 add_header가 있으면 server-level이 무시되므로
    # add_header가 있는 location(/assets/)에서는 헤더를 재명시한다.
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-Frame-Options        "DENY"                            always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    # CSP: same-origin + inline style 허용 (recharts/인라인 style 의존).
    # Phase 5에서 인라인 style 토큰화 후 'unsafe-inline' 제거 예정.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    # HSTS는 HTTPS 환경에서만 의미. 컨테이너는 HTTP라 비활성화:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Ktor service
    # /api/logs -> http://api:8081/api/logs (dashboard는 BASE를 /api로 들고 있음)
    location /api/ {
        proxy_pass http://api:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 빌드 산출물 캐시 (immutable 해시 파일명 가정)
    location /assets/ {
        expires 1y;
        add_header Cache-Control          "public, immutable"               always;
        # server-level 보안 헤더 재명시 (location-level add_header가 있으면 server-level 무시)
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header X-Frame-Options        "DENY"                            always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    }
}
